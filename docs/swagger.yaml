basePath: /api/v1
definitions:
  github_com_quocdev03_user-access-management_internal_dto.AdminChangeStatusRequest:
    properties:
      status:
        enum:
        - active
        - inactive
        - locked
        type: string
    required:
    - status
    type: object
  github_com_quocdev03_user-access-management_internal_dto.AdminNotifyRequest:
    properties:
      message:
        maxLength: 5000
        type: string
      subject:
        maxLength: 200
        type: string
    required:
    - message
    - subject
    type: object
  github_com_quocdev03_user-access-management_internal_dto.AdminUpdateUserRequest:
    properties:
      avatar_url:
        type: string
      date_of_birth:
        type: string
      email:
        type: string
      email_verified:
        type: boolean
      full_name:
        maxLength: 100
        minLength: 2
        type: string
      phone:
        maxLength: 20
        minLength: 9
        type: string
    type: object
  github_com_quocdev03_user-access-management_internal_dto.AssignPermissionsRequest:
    properties:
      permission_ids:
        items:
          type: integer
        type: array
    required:
    - permission_ids
    type: object
  github_com_quocdev03_user-access-management_internal_dto.AssignRoleRequest:
    properties:
      role_id:
        type: integer
    required:
    - role_id
    type: object
  github_com_quocdev03_user-access-management_internal_dto.ChangePasswordRequest:
    properties:
      new_password:
        minLength: 8
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  github_com_quocdev03_user-access-management_internal_dto.CreateRoleRequest:
    properties:
      description:
        maxLength: 255
        type: string
      name:
        maxLength: 50
        type: string
    required:
    - name
    type: object
  github_com_quocdev03_user-access-management_internal_dto.DeviceResponse:
    properties:
      browser:
        type: string
      device_name:
        type: string
      device_type:
        type: string
      id:
        type: integer
      ip_address:
        type: string
      last_active_at:
        type: string
      os:
        type: string
    type: object
  github_com_quocdev03_user-access-management_internal_dto.ForceChangePasswordRequest:
    properties:
      email:
        type: string
      new_password:
        minLength: 8
        type: string
      temp_password:
        type: string
    required:
    - email
    - new_password
    - temp_password
    type: object
  github_com_quocdev03_user-access-management_internal_dto.ForgotPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  github_com_quocdev03_user-access-management_internal_dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  github_com_quocdev03_user-access-management_internal_dto.LoginResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/github_com_quocdev03_user-access-management_internal_dto.UserInfoResponse'
    type: object
  github_com_quocdev03_user-access-management_internal_dto.PermissionResponse:
    properties:
      action:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      resource:
        type: string
    type: object
  github_com_quocdev03_user-access-management_internal_dto.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  github_com_quocdev03_user-access-management_internal_dto.RefreshTokenResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  github_com_quocdev03_user-access-management_internal_dto.RegisterRequest:
    properties:
      date_of_birth:
        type: string
      email:
        type: string
      full_name:
        maxLength: 100
        type: string
      password:
        minLength: 8
        type: string
      phone:
        maxLength: 20
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - date_of_birth
    - email
    - full_name
    - password
    - phone
    - username
    type: object
  github_com_quocdev03_user-access-management_internal_dto.RegisterResponse:
    properties:
      email:
        type: string
      id:
        type: integer
      status:
        type: string
      username:
        type: string
    type: object
  github_com_quocdev03_user-access-management_internal_dto.RequestEmailChangeRequest:
    properties:
      current_password:
        type: string
      new_email:
        type: string
    required:
    - current_password
    - new_email
    type: object
  github_com_quocdev03_user-access-management_internal_dto.ResendVerificationEmailRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  github_com_quocdev03_user-access-management_internal_dto.ResetPasswordRequest:
    properties:
      new_password:
        minLength: 8
        type: string
      token:
        type: string
    required:
    - new_password
    - token
    type: object
  github_com_quocdev03_user-access-management_internal_dto.RoleResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      permissions:
        items:
          $ref: '#/definitions/github_com_quocdev03_user-access-management_internal_dto.PermissionResponse'
        type: array
    type: object
  github_com_quocdev03_user-access-management_internal_dto.SessionResponse:
    properties:
      created_at:
        type: string
      device_id:
        type: integer
      expires_at:
        type: string
      id:
        type: integer
      ip_address:
        type: string
      is_current:
        type: boolean
      user_agent:
        type: string
    type: object
  github_com_quocdev03_user-access-management_internal_dto.UpdateProfileRequest:
    properties:
      date_of_birth:
        type: string
      full_name:
        maxLength: 100
        type: string
      phone:
        maxLength: 20
        type: string
    type: object
  github_com_quocdev03_user-access-management_internal_dto.UpdateRoleRequest:
    properties:
      description:
        maxLength: 255
        type: string
      name:
        maxLength: 50
        type: string
    required:
    - name
    type: object
  github_com_quocdev03_user-access-management_internal_dto.UploadAvatarResponse:
    properties:
      avatar_url:
        type: string
    type: object
  github_com_quocdev03_user-access-management_internal_dto.UserInfoResponse:
    properties:
      email:
        type: string
      full_name:
        type: string
      id:
        type: integer
      username:
        type: string
    type: object
  github_com_quocdev03_user-access-management_internal_dto.UserProfileResponse:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      date_of_birth:
        type: string
      email:
        type: string
      email_verified:
        type: boolean
      full_name:
        type: string
      id:
        type: integer
      phone:
        type: string
      roles:
        items:
          type: string
        type: array
      status:
        type: string
      username:
        type: string
    type: object
  github_com_quocdev03_user-access-management_internal_dto.VerifyEmailChangeRequest:
    properties:
      new_otp:
        type: string
      old_otp:
        type: string
    required:
    - new_otp
    - old_otp
    type: object
  github_com_quocdev03_user-access-management_internal_dto.VerifyEmailRequest:
    properties:
      email:
        type: string
      otp:
        type: string
    required:
    - email
    - otp
    type: object
  github_com_quocdev03_user-access-management_pkg_response.Response:
    properties:
      data: {}
      error: {}
      message:
        type: string
      meta: {}
      success:
        type: boolean
    type: object
host: localhost:8080
info:
  contact:
    email: quocdt2003@gmail.com
    name: Quoc Dev
  description: Hệ thống quản lý truy cập người dùng RESTful API bằng Golang/Gin.
  termsOfService: http://swagger.io/terms/
  title: User Access Management API
  version: "1.0"
paths:
  /admin/audit-logs/export:
    get:
      consumes:
      - application/json
      description: Xuất nhật ký hệ thống (audit logs) ra file CSV (tối đa 10000 dòng)
      parameters:
      - description: Lọc theo User ID
        in: query
        name: user_id
        type: integer
      - description: 'Lọc theo hành động (VD: login, create_user)'
        in: query
        name: action
        type: string
      - description: Từ ngày (YYYY-MM-DD)
        in: query
        name: start_date
        type: string
      - description: Đến ngày (YYYY-MM-DD)
        in: query
        name: end_date
        type: string
      produces:
      - text/csv
      responses:
        "200":
          description: File CSV
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Xuất Audit Logs
      tags:
      - Admin - Audit Logs
  /admin/roles:
    get:
      consumes:
      - application/json
      description: Lấy danh sách tất cả các role trong hệ thống
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_quocdev03_user-access-management_internal_dto.RoleResponse'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Lấy danh sách Roles
      tags:
      - Admin - Roles
    post:
      consumes:
      - application/json
      description: Tạo một role mới trong hệ thống
      parameters:
      - description: Thông tin Role
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_quocdev03_user-access-management_internal_dto.CreateRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/github_com_quocdev03_user-access-management_internal_dto.RoleResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Tạo Role mới
      tags:
      - Admin - Roles
  /admin/roles/{id}:
    delete:
      consumes:
      - application/json
      description: Xóa một role khỏi hệ thống (nếu không có user đang sử dụng)
      parameters:
      - description: Role ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Xóa Role
      tags:
      - Admin - Roles
    put:
      consumes:
      - application/json
      description: Cập nhật thông tin của một role
      parameters:
      - description: Role ID
        in: path
        name: id
        required: true
        type: integer
      - description: Thông tin cập nhật
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_quocdev03_user-access-management_internal_dto.UpdateRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Cập nhật Role
      tags:
      - Admin - Roles
  /admin/roles/{id}/permissions:
    put:
      consumes:
      - application/json
      description: Phân quyền (permissions) cho một role
      parameters:
      - description: Role ID
        in: path
        name: id
        required: true
        type: integer
      - description: Danh sách permission IDs
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_quocdev03_user-access-management_internal_dto.AssignPermissionsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Gán Permissions cho Role
      tags:
      - Admin - Roles
  /admin/users:
    get:
      consumes:
      - application/json
      description: Dành cho Admin lấy danh sách users (hỗ trợ phân trang, lọc, sắp
        xếp)
      parameters:
      - description: Số trang
        in: query
        name: page
        type: integer
      - description: Kích thước trang
        in: query
        name: page_size
        type: integer
      - description: Sắp xếp theo trường nào
        in: query
        name: sort_by
        type: string
      - description: Chiều sắp xếp (asc/desc)
        in: query
        name: sort_order
        type: string
      - description: Lọc theo trạng thái
        in: query
        name: status
        type: string
      - description: Tìm kiếm theo username/email
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_quocdev03_user-access-management_internal_dto.UserProfileResponse'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Lấy danh sách người dùng
      tags:
      - Admin - Users
  /admin/users/{id}:
    get:
      consumes:
      - application/json
      description: Dành cho Admin xem chi tiết thông tin của một user cụ thể
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/github_com_quocdev03_user-access-management_internal_dto.UserProfileResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Xem chi tiết người dùng
      tags:
      - Admin - Users
    put:
      consumes:
      - application/json
      description: Dành cho Admin cập nhật thông tin cá nhân của user
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: Dữ liệu cập nhật
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_quocdev03_user-access-management_internal_dto.AdminUpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Cập nhật thông tin người dùng
      tags:
      - Admin - Users
  /admin/users/{id}/notify:
    post:
      consumes:
      - application/json
      description: Dành cho Admin gửi email thông báo trực tiếp tới user
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: Nội dung thông báo
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_quocdev03_user-access-management_internal_dto.AdminNotifyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Gửi thông báo cho người dùng
      tags:
      - Admin - Users
  /admin/users/{id}/password/reset:
    post:
      consumes:
      - application/json
      description: Dành cho Admin reset mật khẩu của user về mật khẩu tạm thời
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Đặt lại mật khẩu người dùng
      tags:
      - Admin - Users
  /admin/users/{id}/roles:
    post:
      consumes:
      - application/json
      description: Gán một role cho một user
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: Role ID cần gán
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_quocdev03_user-access-management_internal_dto.AssignRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_quocdev03_user-access-management_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Gán Role cho User
      tags:
      - Admin - Roles
  /admin/users/{id}/roles/{roleId}:
    delete:
      consumes:
      - application/json
      description: Gỡ một role đã được gán cho một user
      parameters:
      - description: User ID
        in: path
        name: id
