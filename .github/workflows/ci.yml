name: Go CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run Go Vet
        run: go vet ./...

      - name: Run Tests
        run: go test -v ./...

      - name: Build Application
        run: go build -v -o server ./cmd/server/main.go

  deploy:
    name: Trigger Render Deploy
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy Webhook
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          else
            echo "RENDER_DEPLOY_HOOK_URL secret is not set, skipping deploy hook trigger."
            echo "Please set RENDER_DEPLOY_HOOK_URL in your GitHub repository secrets if you want to force Render deploys after CI passes."
          fi
