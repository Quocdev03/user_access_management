name: Go CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run Go Vet
        run: go vet ./...

      - name: Run Tests
        run: go test -v ./...

      - name: Build Application
        run: go build -v -o server ./cmd/server/main.go

  deploy:
    name: Trigger Render Deploy
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      deployments: write
      contents: read
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

    steps:
      - name: Create GitHub Deployment
        id: deployment
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        uses: chrnorm/deployment-action@v2
        with:
          token: '${{ github.token }}'
          environment-url: https://chiquocdev.me
          environment: production
          initial-status: in_progress

      - name: Trigger Render Deploy Webhook
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        run: |
          curl -f -X POST "${{ env.RENDER_DEPLOY_HOOK_URL }}"

      - name: Update deployment status to Success
        if: "${{ success() && steps.deployment.outputs.deployment_id != '' }}"
        uses: chrnorm/deployment-action@v2
        with:
          type: update
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state: 'success'
          environment-url: https://chiquocdev.me
          environment: production

      - name: Update deployment status to Failure
        if: "${{ failure() && steps.deployment.outputs.deployment_id != '' }}"
        uses: chrnorm/deployment-action@v2
        with:
          type: update
          token: '${{ github.token }}'
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state: 'failure'
          environment: production

      - name: Skip deploy info
        if: env.RENDER_DEPLOY_HOOK_URL == ''
        run: |
          echo "RENDER_DEPLOY_HOOK_URL secret is not set, skipping deployment."
          echo "Please set RENDER_DEPLOY_HOOK_URL in your GitHub repository secrets if you want to trigger Render deploys and register them in GitHub Deployments."
